app:
  name: "websocket-chat"
  version: "1.0.0"
  environment: "development"

server:
  host: "0.0.0.0"
  port: 8085
  websocket:
    path: "/ws"
    read_buffer_size: 1024
    write_buffer_size: 1024
    max_message_size: 65536
    ping_interval: 30s
    pong_timeout: 60s
    write_timeout: 10s
    max_connections_per_ip: 10
  http:
    read_timeout: 30s
    write_timeout: 30s
    idle_timeout: 120s
    max_header_bytes: 1048576
  tls:
    enabled: false

database:
  postgresql:
    host: "localhost"
    port: 5432
    database: "chat"
    user: "chat"
    password: "${DB_PASSWORD}"
    ssl_mode: "disable"
    max_open_conns: 25
    max_idle_conns: 10
    conn_max_lifetime: 30m

redis:
  mode: "single"
  addrs:
    - "localhost:6379"
  password: "${REDIS_PASSWORD}"
  db: 0
  pool_size: 10
  min_idle_conns: 5

auth:
  jwt:
    algorithm: "HS256"
    private_key: "${JWT_SECRET}"
    public_key: "${JWT_SECRET}"
    access_token_ttl: 15m
    refresh_token_ttl: 168h
    issuer: "chat-app"
    audience:
      - "chat-api"
  bcrypt:
    cost: 12

rate_limit:
  enabled: true
  rules:
    - key: "message"
      limit: 100
      window: 1m
    - key: "connection"
      limit: 5
      window: 1m
    - key: "room_create"
      limit: 10
      window: 1h

features:
  message_retention_days: 365
  max_file_size: 10485760
  allowed_file_types:
    - "image/*"
    - "application/pdf"
  enable_read_receipts: true
  enable_typing_indicators: true
  enable_reactions: true
  enable_threads: true

observability:
  logging:
    level: "debug"
    format: "json"
    output: "stdout"
    file_path: "logs/app.log"
  metrics:
    enabled: true
    port: 9090
    path: "/metrics"
  tracing:
    enabled: false
    exporter: "jaeger"
    endpoint: "http://localhost:14268/api/traces"
    sampling_rate: 0.01

storage:
  type: "minio"
  minio:
    endpoint: "localhost:9000"
    access_key: "${MINIO_ACCESS_KEY}"
    secret_key: "${MINIO_SECRET_KEY}"
    bucket: "chat-uploads"
    use_ssl: false
  s3:
    region: "us-east-1"
    bucket: "chat-uploads"
