name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  GO_VERSION: '1.23'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify Dependencies
        run: go mod verify

      - name: Build Codebase
        run: go build -buildvcs=false ./...

      - name: Run Unit & Integration Tests (Race Detector)
        run: go test -buildvcs=false -race -v ./...

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chat
          POSTGRES_USER: chat
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Database Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Generate JWT RSA Keys
        run: bash scripts/generate_keys.sh

      - name: Build Server Binary
        run: go build -buildvcs=false -o server ./cmd/server

      - name: Apply Database Migrations
        run: |
          PGPASSWORD=postgres psql -h localhost -U chat -d chat -f migrations/001_init.sql

      - name: Start Server
        env:
          DB_PASSWORD: postgres
        run: |
          ./server &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          # Wait for server readiness
          for i in $(seq 1 30); do
            if curl -s http://localhost:8085/healthz > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run E2E Tests
        env:
          DB_PASSWORD: postgres
        run: go test -buildvcs=false -race -v -tags=e2e ./test/e2e/...

      - name: Stop Server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

  security-and-lint:
    name: Security & Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.56.2
          args: --timeout=5m

      - name: Run Vulnerability Check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
